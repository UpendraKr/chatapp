{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AweSome Chat</title>

    <link rel="stylesheet" href="{% static 'chat/style.css' %}">

</head>

<body>

<div class="topbar">

    <span class="topbar-title">💬 AweSome Chat</span>

    <div class="topbar-right">
        <span class="me-label">Logged in as <b id="current-user"></b></span>
        <button onclick="logout()">Logout</button>
    </div>

</div>

<div class="container" id="container">

    <div class="left-panel">

        <h3 class="panel-heading">Chats</h3>

        <div id="user-list"></div>
    </div>


    <div class="right-panel">

        <div class="chat-header">
            <button class="back-btn" onclick="closeConversation()" aria-label="Back">←</button>
            <div class="chat-header-avatar" id="chat-avatar"></div>
            <span id="chat-user">Select a chat</span>
        </div>

        <div id="messages">
            <div class="empty-state" id="empty-state">
                <p>👋 Select a user to start chatting</p>
            </div>
        </div>

        <div class="bottom">

            <input
                id="message"
                placeholder="Type message..."
                onkeydown="if(event.key==='Enter'){sendMessage()}"
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>


<script src="{% static 'chat/chat.js' %}"></script>

</body>
</html>
